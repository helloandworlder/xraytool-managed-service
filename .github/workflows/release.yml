name: Release CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.2.0'
        required: true
        type: string
      draft:
        description: 'Create release as draft'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.event.inputs.version }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.0'
  NODE_VERSION: '22'
  PNPM_VERSION: '10.28.2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
            version="${version#refs/tags/}"
            if [[ "${version}" != v* ]]; then
              version="v${version}"
            fi
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "tag_name=${version}" >> "${GITHUB_OUTPUT}"
          echo "release_name=XrayTool ${version}" >> "${GITHUB_OUTPUT}"

      - name: Run backend tests
        run: go test ./...

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build backend binaries locally
        run: go build ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          docker run --rm -v "$PWD":/src -w /src debian:bullseye bash -lc '
            set -euo pipefail
            apt-get update
            apt-get install -y ca-certificates curl gcc
            curl -fsSL https://go.dev/dl/go${{ env.GO_VERSION }}.linux-amd64.tar.gz -o /tmp/go.tgz
            tar -C /usr/local -xzf /tmp/go.tgz
            export PATH=/usr/local/go/bin:$PATH
            CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o dist/xraytool-linux-amd64 ./cmd/xraytool
            CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o dist/xraytoolctl-linux-amd64 ./cmd/xtoolctl
          '

      - name: Package release bundles
        run: bash scripts/package_release.sh amd64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum \
            xraytool-linux-amd64 \
            xraytoolctl-linux-amd64 \
            xraytool-linux-amd64.tar.gz \
            > checksums.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xraytool-release-${{ steps.meta.outputs.tag_name }}
          path: |
            dist/xraytool-linux-amd64
            dist/xraytoolctl-linux-amd64
            dist/xraytool-linux-amd64.tar.gz
            dist/checksums.txt

      - name: Create git tag for manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.meta.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.meta.outputs.tag_name }} already exists"
          else
            git tag "${{ steps.meta.outputs.tag_name }}" "${GITHUB_SHA}"
            git push origin "${{ steps.meta.outputs.tag_name }}"
          fi

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft == 'true' || false }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease == 'true' || false }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            dist/xraytool-linux-amd64
            dist/xraytoolctl-linux-amd64
            dist/xraytool-linux-amd64.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
